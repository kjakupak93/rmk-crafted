name: E2E Tests

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test --project=smoke

      # Visual snapshot baselines are platform-specific (darwin vs linux).
      # When linux baselines are missing (first run after new visual tests are
      # added on macOS), generate them here and commit back so future runs do
      # real diff-based regression testing.
      - name: Bootstrap linux visual snapshots if missing
        run: |
          SNAP_DIR="tests/e2e/visual-coverage.spec.ts-snapshots"
          if ! ls "${SNAP_DIR}"/*-linux.png 2>/dev/null | grep -q .; then
            echo "No linux baselines found — generating..."
            npx playwright test --project=e2e tests/e2e/visual-coverage.spec.ts --update-snapshots || true
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "${SNAP_DIR}/"
            if ! git diff --staged --quiet; then
              git commit -m "chore: add linux playwright snapshot baselines [skip actions]"
              git push
            fi
          fi

      - name: Run e2e tests
        run: npx playwright test --project=e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
