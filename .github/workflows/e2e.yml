name: E2E Tests

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test --project=smoke

      # Visual snapshot baselines are platform-specific (darwin vs linux).
      # Regenerate and commit whenever any linux baseline is missing — covers
      # both first-time setup (no files) and stale-snapshot reset (one deleted).
      - name: Bootstrap linux visual snapshots if missing
        run: |
          SNAP_DIR="tests/e2e/visual-coverage.spec.ts-snapshots"
          LINUX_COUNT=$(find "$SNAP_DIR" -name "*-e2e-linux.png" 2>/dev/null | wc -l)
          DARWIN_COUNT=$(find "$SNAP_DIR" -name "*-e2e-darwin.png" 2>/dev/null | wc -l)
          if [ "$LINUX_COUNT" -lt "$DARWIN_COUNT" ]; then
            echo "Missing linux baselines ($LINUX_COUNT of $DARWIN_COUNT) — regenerating..."
            npx playwright test --project=e2e tests/e2e/visual-coverage.spec.ts --update-snapshots || true
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "${SNAP_DIR}/"
            if ! git diff --staged --quiet; then
              git commit -m "chore: update linux playwright snapshot baselines [skip actions]"
              git push
            fi
          fi

      - name: Run e2e tests
        run: npx playwright test --project=e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
